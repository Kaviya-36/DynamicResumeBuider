<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="sticky-top bg-dark text-white text-center p-3 shadow d-flex justify-content-between align-items-center">
  <h3 class="mb-0">Resume Builder</h3>
  <div class="d-flex gap-2">
    <select id="templateSelect" class="form-select form-select-sm">
      <option value="classic">Classic</option>
      <option value="modern">Modern</option>
    </select>
    <button id="themeToggle" class="btn btn-outline-light btn-sm">Dark/Light Mode</button>
  </div>
</header>

<div class="container my-4">

  <!-- Form Section -->
  <div class="card p-4 mb-4 shadow">
    <h4>Resume Form</h4>
    <form id="resumeForm" novalidate>

      <!-- Profile Photo -->
      <div class="mb-3">
        <label>Profile Photo</label>
        <input type="file" class="form-control" id="profilePhoto" accept="image/*">
        <div id="photoPreview" class="mt-2"></div>
      </div>

      <!-- Personal Info -->
      <h5 class="mt-3">Personal Information</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <input type="text" class="form-control" id="fullName" placeholder="Full Name" required>
          <div class="invalid-feedback">Name is required.</div>
        </div>
        <div class="col-md-6">
          <input type="text" class="form-control" id="role" placeholder="Role/Title">
        </div>
        <div class="col-md-6">
          <input type="tel" class="form-control" id="phone" placeholder="Phone" required>
          <div class="invalid-feedback">Enter valid phone (10+ digits).</div>
        </div>
        <div class="col-md-6">
          <input type="email" class="form-control" id="email" placeholder="Email" required>
          <div class="invalid-feedback">Enter valid email.</div>
        </div>
        <div class="col-md-6">
          <input type="text" class="form-control" id="location" placeholder="Location">
        </div>
        <div class="col-md-6">
          <input type="url" class="form-control" id="linkedin" placeholder="LinkedIn URL">
        </div>
        <div class="col-md-6">
          <input type="url" class="form-control" id="github" placeholder="GitHub/Portfolio URL">
        </div>
        <div class="col-12">
          <textarea class="form-control" id="summary" rows="3" maxlength="500"
            placeholder="Profile Summary (max 500 chars)" required></textarea>
          <small class="text-muted" id="summaryCounter">0 / 500</small>
          <div class="invalid-feedback">Summary is required.</div>
        </div>
      </div>

      <!-- Skills -->
      <h5 class="mt-4">Skills</h5>
      <div class="input-group mb-2">
        <input type="text" id="skillInput" class="form-control" placeholder="Add skill">
        <button type="button" class="btn btn-primary" id="addSkill">Add</button>
      </div>
      <div id="skillsContainer"></div>

      <!-- Languages -->
      <h5 class="mt-4">Languages</h5>
      <div class="input-group mb-2">
        <input type="text" id="languageInput" class="form-control" placeholder="Add language">
        <button type="button" class="btn btn-primary" id="addLanguage">Add</button>
      </div>
      <div id="languagesContainer"></div>

      <!-- Hobbies -->
      <h5 class="mt-4">Hobbies</h5>
      <div class="input-group mb-2">
        <input type="text" id="hobbyInput" class="form-control" placeholder="Add hobby">
        <button type="button" class="btn btn-primary" id="addHobby">Add</button>
      </div>
      <div id="hobbiesContainer"></div>

      <!-- Experience -->
      <h5 class="mt-4">Experience</h5>
      <div id="experienceContainer"></div>
      <button type="button" class="btn btn-secondary my-2" id="addExperience">Add Experience</button>

      <!-- Education -->
      <h5 class="mt-4">Education</h5>
      <div id="educationContainer"></div>
      <button type="button" class="btn btn-secondary my-2" id="addEducation">Add Education</button>

      <!-- Projects -->
      <h5 class="mt-4">Projects</h5>
      <div id="projectContainer"></div>
      <button type="button" class="btn btn-secondary my-2" id="addProject">Add Project</button>

      <!-- Certifications -->
      <h5 class="mt-4">Certifications</h5>
      <div id="certificationsContainer"></div>
      <button type="button" class="btn btn-secondary my-2" id="addCertification">Add Certification</button>

      <!-- Buttons -->
      <div class="mt-4">
        <button type="button" class="btn btn-success" id="generateBtn">Generate Resume</button>
        <button type="reset" class="btn btn-danger">Clear</button>
        <button type="button" class="btn btn-dark" onclick="window.print()">Download PDF</button>
      </div>

    </form>
  </div>

  <!-- Resume Preview -->
  <div class="card p-4 shadow" id="resumePreview">
    <h4 class="text-center text-muted mb-3">Resume Preview</h4>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
